# One-shot verification workflow for PRIVATE_SECRETS_JS_B64.
#
# Decodes the secret in CI, greps for known strings, and logs only the
# result of each grep (PRESENT / ABSENT). The decoded file is written to
# a temp path and never echoed. Safe to run on a public repo.
#
# Run manually: GitHub repo → Actions → "Verify Private Secrets" →
# "Run workflow" button.

name: Verify Private Secrets

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode secret to temp file
        env:
          PRIVATE_SECRETS_JS_B64: ${{ secrets.PRIVATE_SECRETS_JS_B64 }}
        run: |
          if [ -z "$PRIVATE_SECRETS_JS_B64" ]; then
            echo "::error::PRIVATE_SECRETS_JS_B64 is not set"
            exit 1
          fi
          echo "$PRIVATE_SECRETS_JS_B64" | base64 -d > /tmp/secrets.js
          echo "Secret decoded — $(wc -c < /tmp/secrets.js) bytes, $(wc -l < /tmp/secrets.js) lines"

      - name: Check Google Cloud project — NEW Selebox project
        run: |
          if grep -q "771577005846" /tmp/secrets.js; then
            echo "✅ NEW Selebox client IDs (771577005846-*) PRESENT"
          else
            echo "❌ NEW Selebox client IDs (771577005846-*) ABSENT"
          fi

      - name: Check Google Cloud project — OLD Tales-of-Siren project
        run: |
          if grep -q "152263386495" /tmp/secrets.js; then
            echo "⚠️ OLD Tales-of-Siren client IDs (152263386495-*) PRESENT"
          else
            echo "✅ OLD Tales-of-Siren client IDs (152263386495-*) ABSENT (good — replaced)"
          fi

      - name: Check Supabase URL — custom auth.selebox.com domain
        run: |
          if grep -q "auth.selebox.com" /tmp/secrets.js; then
            echo "✅ Supabase URL is auth.selebox.com (custom domain)"
          elif grep -q "supabase.co" /tmp/secrets.js; then
            echo "⚠️ Supabase URL is *.supabase.co (default — should be auth.selebox.com per task #44)"
          else
            echo "❌ No Supabase URL found"
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/secrets.js
