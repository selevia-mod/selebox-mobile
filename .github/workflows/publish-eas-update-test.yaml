name: Publish EAS Update on test

on:
  push:
    branches:
      - test

jobs:
  publish-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Check EAS login
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Publish test update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          IS_TEST_UPDATE: "true"
        run: eas update --branch main --message "Test OTA update ($(git rev-parse --short HEAD))"
