name: Publish EAS Update on test

on:
  push:
    branches:
      - test

jobs:
  publish-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # `private/secrets.js` is gitignored (it holds API keys / project IDs)
      # so a fresh clone in CI doesn't have the file. We pass its contents
      # via a base64-encoded GitHub secret and decode it back into place
      # before bundling. The file's values still bake into the published
      # JS bundle the same way as in a local build — this just keeps the
      # raw file out of git history. Same step the main workflow uses.
      - name: Restore private/secrets.js
        env:
          PRIVATE_SECRETS_JS_B64: ${{ secrets.PRIVATE_SECRETS_JS_B64 }}
        run: |
          if [ -z "$PRIVATE_SECRETS_JS_B64" ]; then
            echo "::error::PRIVATE_SECRETS_JS_B64 secret is not set"
            exit 1
          fi
          mkdir -p private
          echo "$PRIVATE_SECRETS_JS_B64" | base64 -d > private/secrets.js
          echo "Wrote private/secrets.js ($(wc -c < private/secrets.js) bytes)"

      - name: Check EAS login
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Publish test update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          IS_TEST_UPDATE: "true"
        # Publishes to `--branch main` on purpose — every production build
        # (eas.json production-apk / production-aab / production-ios) sets
        # `"channel": "main"`, so that's the only channel any installed app
        # actually reads from. The `IS_TEST_UPDATE: "true"` env var makes
        # `app.config.js` embed `isTestUpdate: true` into the manifest;
        # `app/_layout.jsx` then filters at runtime so only users with
        # `isTester: true` on their Appwrite profile actually pull and
        # apply the update. Non-testers see the update appear in EAS but
        # never receive it.
        run: eas update --branch main --message "Test OTA update ($(git rev-parse --short HEAD))"
